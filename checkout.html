<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nepla - Checkout</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Nepla</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><span id="user-profile" style="display: none"></span></li>
          <li>
            <a href="#" id="cart-toggle"
              >Cart (<span id="cart-count">0</span>)</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <div class="form-container slide-in">
      <h2>Checkout</h2>
      <div id="checkout-login" style="display: none">
        <p>Please log in to proceed with checkout.</p>
        <button onclick="window.location.href='login.html'">Login</button>
        <p style="text-align: center; margin-top: 1rem">
          New here? <a href="signup.html">Sign up</a>
        </p>
      </div>
      <div id="checkout-form" style="display: none">
        <p>Total: $<span id="checkout-total">0</span></p>
        <form id="payment-form">
          <label for="address">Shipping Address</label>
          <input type="text" id="address" required />
          <button type="submit">Complete Purchase</button>
        </form>
        <button
          id="logout-btn"
          style="background-color: #d32f2f; margin-top: 1rem"
        >
          Logout
        </button>
      </div>
    </div>

    <footer>
      <p>© 2025 Nepla. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
